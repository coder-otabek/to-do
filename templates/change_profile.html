<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Profilni tahrirlash</title>
    <style>
        body { background: #0a0a0c; color: white; font-family: sans-serif; padding: 40px 20px; }
        .edit-box { max-width: 500px; margin: 0 auto; background: #141417; padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); }
        .avatar-preview { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; display: block; margin: 0 auto 20px; border: 3px solid #00f2ff; cursor: pointer; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #9494a5; font-size: 0.8rem; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; background: #1c1c21; border: 1px solid #2d2d35; border-radius: 10px; color: white; box-sizing: border-box; }
        .btn-save { background: #00f2ff; color: #000; border: none; padding: 14px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .error { color: #ff4d4f; font-size: 0.8rem; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="edit-box">
        <h2 style="text-align:center; margin-top:0;">Profil tahriri</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Avatar -->
            <div style="text-align:center;">
                <label for="id_avatar">
                    <img id="output"
                         src="{% if user.profile.avatar %}{{ user.profile.avatar.url }}{% else %}/static/default.png{% endif %}"
                         class="avatar-preview"
                         title="Rasmni almashtirish">
                </label>
                <div style="display:none;">{{ form.avatar }}</div>
            </div>

            <!-- Full name -->
            <div class="form-group">
                <label>To'liq ism</label>
                {{ form.full_name }}
                <div class="error">{{ form.full_name.errors }}</div>
            </div>

            <!-- Username -->
            <div class="form-group">
                <label>Username</label>
                {{ form.username }}
                <div class="error">{{ form.username.errors }}</div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label>Email</label>
                {{ form.email }}
                <div class="error">{{ form.email.errors }}</div>
            </div>

            <!-- Phone -->
            <div class="form-group">
                <label>Telefon raqam</label>
                {{ form.phone }}
                <div class="error">{{ form.phone.errors }}</div>
            </div>

            <button type="submit" class="btn-save">O'ZGARISHLARNI SAQLASH</button>

            <a href="/profile" style="display:block; text-align:center; margin-top:15px; color:#555; text-decoration:none;">
                Bekor qilish
            </a>
        </form>
    </div>

    <script>
        document.getElementById('id_avatar').onchange = function (evt) {
            var files = evt.target.files;
            if (files && files.length) {
                var fr = new FileReader();
                fr.onload = function () {
                    document.getElementById('output').src = fr.result;
                }
                fr.readAsDataURL(files[0]);
            }
        }
    </script>
</body>
</html>
