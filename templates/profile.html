<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Mening Profilim</title>
    <style>
        body { background: #0a0a0c; color: white; font-family: sans-serif; margin: 0; }
        .profile-container { max-width: 900px; margin: 50px auto; padding: 20px; }
        .header-card { background: linear-gradient(135deg, #141417 0%, #0a0a0c 100%); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 30px; position: relative; overflow: hidden; }
        .avatar-lg { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #00f2ff; object-fit: cover; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .stat-card { background: #141417; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.03); }
        .btn-edit { background: rgba(0,242,255,0.1); color: #00f2ff; padding: 8px 20px; border-radius: 10px; text-decoration: none; font-size: 0.9rem; border: 1px solid rgba(0,242,255,0.3); transition: 0.3s; }
        .btn-edit:hover { background: #00f2ff; color: #000; }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="header-card">
            <img src="{{ user.profile.avatar.url }}" class="avatar-lg" alt="Avatar">
            <div>
                <h1 style="margin:0;">{{ user.profile.full_name|default:user.username }}</h1>
                <p style="color:#9494a5;">Username: {{ user.username }} </p>
                <div style="margin-top:15px; display:flex; gap:10px;">
                    <a href="/" class="btn-edit">Asosiy sahifa</a>
                    <a href="/profile_change" class="btn-edit">Profilni tahrirlash</a>
                    <a href="/change_password" class="btn-edit">Parolni yangilash</a>

                </div>
            </div>
        </div>

    </div>
</body>
</html>
