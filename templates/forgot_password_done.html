<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Email yuborildi</title>
    <style>
        body { background: #0a0a0c; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { text-align: center; background: #141417; padding: 50px; border-radius: 20px; border: 1px solid rgba(0,242,255,0.2); max-width: 400px; }
        .icon { font-size: 4rem; margin-bottom: 20px; }
        h2 { color: #00f2ff; }
        p { color: #9494a5; line-height: 1.6; }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: transparent; border: 1px solid #00f2ff; color: #00f2ff; text-decoration: none; border-radius: 8px; transition: 0.3s; }
        .btn:hover { background: #00f2ff; color: black; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📩</div>
        <h2>Havola yuborildi!</h2>
        <p>Agar ushbu email bazamizda bo'lsa, parolni tiklash bo'yicha ko'rsatmalarni yubordik. Konsol (terminal)ni tekshiring.</p>
        <a href="/login" class="btn">Loginga qaytish</a>
    </div>
</body>
</html>
