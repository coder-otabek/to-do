<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Yangi parol o'rnatish</title>
    <style>
        /* forgot_password bilan bir xil stil, faqat form o'zgargan */
        :root { --bg: #0a0a0c; --card: #141417; --accent: #00f2ff; --text: #e1e1e6; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .glass-card { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 350px; }
        .btn { background: var(--accent); color: black; width: 100%; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px;}
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 10px; background: #1c1c21; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2 style="margin-top: 0;">Yangi parol</h2>
        {% if validlink %}
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label style="font-size: 0.8rem; color: #9494a5;">{{ field.label }}</label><br>
                <input type="password" name="{{ field.html_name }}" required>
                {% if field.errors %}<small style="color: red;">{{ field.errors.0 }}</small>{% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn">PAROLNI SAQLASH</button>
        </form>
        {% else %}
        <p style="color: red;">Link muddati o'tgan.</p>
        <a href="{% url 'password_reset' %}" style="color: #00f2ff;">Qaytadan urinish</a>
        {% endif %}
    </div>
</body>
</html>
