<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MyToDo{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Manrope:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root {
            --bg: #0a0a0c;
            --bg-alt: #0d0d10;
            --card: #141417;
            --card-hover: #18181d;
            --accent: #00f2ff;
            --accent-dim: rgba(0, 242, 255, 0.15);
            --accent-glow: rgba(0, 242, 255, 0.3);
            --text: #e1e1e6;
            --muted: #9494a5;
            --border: rgba(255, 255, 255, 0.06);
            --border-accent: rgba(0, 242, 255, 0.3);
            --danger: #ff453a;
            --success: #30d158;
            --warning: #ffd60a;
            --info: #0a84ff;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--accent-dim); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* Background blobs */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
        }
        .bg-blob-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0,242,255,0.07) 0%, transparent 70%);
            top: -150px; right: -150px;
        }
        .bg-blob-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0,100,255,0.05) 0%, transparent 70%);
            bottom: -100px; left: -100px;
        }

        /* Main content */
        .main-content {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px 60px;
        }

        /* Mono tag */
        .mono-tag {
            font-family: 'Space Mono', monospace;
            color: var(--accent);
            font-size: 0.78rem;
            letter-spacing: 0.5px;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.85rem;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.25s;
            font-family: 'Manrope', sans-serif;
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px var(--accent-glow); }
        .btn-danger { background: rgba(255, 69, 58, 0.15); color: var(--danger); border: 1px solid rgba(255,69,58,0.3); }
        .btn-danger:hover { background: var(--danger); color: #fff; transform: translateY(-2px); }
        .btn-success { background: rgba(48, 209, 88, 0.15); color: var(--success); border: 1px solid rgba(48,209,88,0.3); }
        .btn-success:hover { background: var(--success); color: #000; transform: translateY(-2px); }
        .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
        .btn-mono { font-family: 'Space Mono', monospace; font-size: 0.78rem; letter-spacing: 1px; text-transform: uppercase; }

        /* Cards */
        .glass-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        /* Inputs */
        input, select, textarea {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: var(--text);
            padding: 11px 14px;
            width: 100%;
            outline: none;
            transition: 0.3s;
            font-family: 'Manrope', sans-serif;
            font-size: 0.9rem;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
            background: rgba(0, 242, 255, 0.04);
            box-shadow: 0 0 0 3px rgba(0,242,255,0.08);
        }
        select option { background: #1c1c21; color: var(--text); }
        textarea { resize: vertical; min-height: 100px; }

        /* Labels */
        label {
            display: block;
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 7px;
            font-family: 'Space Mono', monospace;
        }

        /* Form group */
        .form-group { margin-bottom: 20px; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>

{% include 'navbar.html' %}

<div class="main-content">
    {% block content %}{% endblock %}
</div>

<script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
