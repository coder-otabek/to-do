<style>
    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 5%;
        height: 65px;
        background: rgba(10, 10, 12, 0.85);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    .nav-logo {
        font-family: 'Space Mono', monospace;
        font-weight: 700;
        font-size: 1.2rem;
        color: #fff;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .nav-logo span {
        color: var(--accent, #00f2ff);
    }

    .nav-center {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .nav-add {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        background: var(--accent-dim, rgba(0, 242, 255, 0.15));
        color: var(--accent, #00f2ff);
        border: 1px solid var(--border-accent, rgba(0, 242, 255, 0.3));
        border-radius: 10px;
        font-family: 'Space Mono', monospace;
        font-size: 0.78rem;
        font-weight: 700;
        text-decoration: none;
        letter-spacing: 0.5px;
        transition: 0.25s;
    }

    .nav-add:hover {
        background: var(--accent, #00f2ff);
        color: #000;
        transform: translateY(-1px);
        box-shadow: 0 5px 15px rgba(0, 242, 255, 0.3);
    }

    .nav-right {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .nav-user {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 14px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 10px;
        color: var(--muted, #9494a5);
        font-size: 0.85rem;
        font-family: 'Space Mono', monospace;
    }

    .nav-user i {
        color: var(--accent, #00f2ff);
        font-size: 1rem;
    }

    .nav-logout {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        background: rgba(255, 69, 58, 0.1);
        color: #ff453a;
        border: 1px solid rgba(255, 69, 58, 0.25);
        border-radius: 10px;
        font-size: 0.8rem;
        font-family: 'Space Mono', monospace;
        text-decoration: none;
        transition: 0.25s;
    }

    .nav-logout:hover {
        background: rgba(255, 69, 58, 0.2);
        transform: translateY(-1px);
    }
</style>

<nav class="navbar">
    {% if request.user.is_authenticated %}
        <a href="/" class="nav-logo"><span>>_</span> MyToDo</a>

        <div class="nav-center">
            <a href="/created/" class="nav-add">
                <i class='bx bx-plus'></i> Yangi vazifa
            </a>
        </div>

        <div class="nav-right">

            <a href="{% url 'profile' %}" class="nav-user" style="text-decoration: none; transition: 0.25s;">
                <i class='bx bx-user-circle'></i>
                {{ request.user.username }}
            </a>

            <a href="/logout/" class="nav-logout">
                <i class='bx bx-log-out'></i> Chiqish
            </a>

        </div>
    {% endif %}
</nav>
