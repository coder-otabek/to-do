<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parolni tiklash | DevPortfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Manrope:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c; --card: #141417; --accent: #00f2ff; --text: #e1e1e6; --muted: #9494a5;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; margin: 0; overflow: hidden; }
        .bg-blob { position: fixed; width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,242,255,0.15) 0%, transparent 70%); z-index: -1; }
        .auth-page { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .glass-card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .form-tag { font-family: 'Space Mono', monospace; color: var(--accent); font-size: 0.8rem; }
        h2 { margin: 10px 0; font-size: 1.8rem; }
        .form-group { margin-bottom: 20px; }
        .input-wrapper { position: relative; display: flex; align-items: center; background: #1c1c21; border-radius: 10px; border: 1px solid #2d2d35; transition: 0.3s; }
        .input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 10px rgba(0,242,255,0.2); }
        .input-icon { padding: 0 15px; color: var(--accent); }
        input { background: transparent; border: none; color: white; padding: 12px 10px; width: 100%; outline: none; }
        .btn { background: var(--accent); color: #000; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: 700; cursor: pointer; transition: 0.3s; font-family: 'Space Mono'; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,242,255,0.4); }
        .footer-link { text-align: center; margin-top: 20px; font-size: 0.9rem; }
        a { color: var(--muted); text-decoration: none; transition: 0.3s; }
        a:hover { color: var(--accent); }
    </style>
</head>
<body>
    <div class="bg-blob" style="top: -100px; right: -100px;"></div>
    <div class="auth-page">
        <div class="glass-card">
            <span class="form-tag">// reset_password</span>
            <h2>Parolni tiklash</h2>
            <p style="color: var(--muted); font-size: 0.9rem; margin-bottom: 30px;">Emailingizni kiriting, biz havola yuboramiz.</p>

            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">✉</span>
                        <input type="email" name="email" placeholder="Email manzilingiz" required>
                    </div>
                </div>
                <button type="submit" class="btn">HAVOLA YUBORISH →</button>
            </form>

            <div class="footer-link">
                <a href="/login">← Loginga qaytish</a>
            </div>
        </div>
    </div>
</body>
</html>
