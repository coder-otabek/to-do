<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish | DevPortfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Manrope:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c; --card: #141417; --accent: #00f2ff; --text: #e1e1e6; --muted: #9494a5;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .glass-card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); padding: 40px; border-radius: 24px; width: 100%; max-width: 420px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .form-tag { font-family: 'Space Mono', monospace; color: var(--accent); font-size: 0.8rem; }
        h2 { margin: 10px 0 25px; font-size: 1.8rem; letter-spacing: -1px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--muted); }
        input { width: 100%; padding: 12px; background: #1c1c21; border: 1px solid #2d2d35; border-radius: 12px; color: white; outline: none; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0,242,255,0.1); }
        .btn { background: var(--accent); color: #000; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: 800; cursor: pointer; transition: 0.3s; font-family: 'Space Mono'; margin-top: 10px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,242,255,0.3); }
        .footer-link { text-align: center; margin-top: 20px; font-size: 0.9rem; color: var(--muted); }
        a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .error-msg { color: #ff453a; font-size: 0.8rem; margin-top: 5px; list-style: none; padding: 0; }
    </style>
</head>
<body>
    <div class="glass-card">
        <span class="form-tag">// create_account</span>
        <h2>Ro'yxatdan o'tish</h2>

        <form method="POST">
            {% csrf_token %}

            {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <ul class="error-msg">
                        {% for error in field.errors %}<li>{{ error }}</li>{% endfor %}
                    </ul>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit" class="btn">HISOB YARATISH →</button>
        </form>

        <div class="footer-link">
            Profilingiz bormi? <a href="/login">Kirish</a>
        </div>
    </div>
</body>
</html>
