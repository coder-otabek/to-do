{% extends 'base.html' %}

{% block title %}O'chirish | MyToDo{% endblock %}

{% block extra_css %}
<style>
    .delete-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 65px - 90px);
    }

    .delete-card {
        background: var(--card);
        border: 1px solid rgba(255, 69, 58, 0.2);
        border-radius: 24px;
        padding: 50px 40px;
        max-width: 460px;
        width: 100%;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 40px rgba(255,69,58,0.05);
    }

    .delete-icon {
        width: 72px;
        height: 72px;
        background: rgba(255, 69, 58, 0.1);
        border: 1px solid rgba(255,69,58,0.3);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        font-size: 2rem;
        color: var(--danger);
    }

    .delete-card .mono-tag { margin-bottom: 10px; display: block; }

    .delete-card h2 {
        font-size: 1.6rem;
        letter-spacing: -0.5px;
        margin-bottom: 12px;
    }

    .task-name {
        background: rgba(255, 69, 58, 0.08);
        border: 1px solid rgba(255,69,58,0.2);
        border-radius: 10px;
        padding: 12px 16px;
        font-family: 'Space Mono', monospace;
        font-size: 0.9rem;
        color: var(--danger);
        margin: 16px 0 24px;
        word-break: break-word;
    }

    .delete-desc {
        color: var(--muted);
        font-size: 0.88rem;
        line-height: 1.6;
        margin-bottom: 30px;
    }

    .action-row {
        display: flex;
        gap: 12px;
        justify-content: center;
    }

    .btn-delete-confirm {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 24px;
        background: var(--danger);
        color: #fff;
        border: none;
        border-radius: 12px;
        font-weight: 700;
        font-family: 'Space Mono', monospace;
        font-size: 0.8rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        text-decoration: none;
        cursor: pointer;
        transition: 0.3s;
    }
    .btn-delete-confirm:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(255,69,58,0.4);
    }

    .btn-cancel {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 24px;
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 12px;
        font-weight: 600;
        font-size: 0.85rem;
        text-decoration: none;
        transition: 0.3s;
    }
    .btn-cancel:hover {
        border-color: var(--accent);
        color: var(--accent);
    }
</style>
{% endblock %}

{% block content %}
<div class="delete-wrapper">
    <div class="delete-card">
        <div class="delete-icon">
            <i class='bx bx-trash'></i>
        </div>

        <span class="mono-tag">// delete_task</span>
        <h2>O'chirmoqchimisiz?</h2>

        <div class="task-name">{{ todo.title }}</div>

        <p class="delete-desc">
            Bu amal qaytarib bo'lmaydi. Vazifa butunlay o'chirib tashlanadi.
        </p>

        <div class="action-row">
            <a href="?ans=ha" class="btn-delete-confirm">
                <i class='bx bx-trash'></i> Ha, o'chirish
            </a>
            <a href="/" class="btn-cancel">
                <i class='bx bx-x'></i> Bekor qilish
            </a>
        </div>
    </div>
</div>
{% endblock %}
