<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2540"/>
      <stop offset="100%" stop-color="#0d1220"/>
    </radialGradient>
    <clipPath id="circle">
      <circle cx="100" cy="100" r="100"/>
    </clipPath>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <circle cx="100" cy="80" r="35" fill="#4fffb0" fill-opacity="0.15" stroke="#4fffb0" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="100" cy="165" r="60" fill="#4fffb0" fill-opacity="0.08" stroke="#4fffb0" stroke-width="1.5" stroke-opacity="0.3"/>
  <!-- Head -->
  <circle cx="100" cy="78" r="26" fill="#4fffb0" fill-opacity="0.3"/>
  <!-- Body -->
  <ellipse cx="100" cy="148" rx="44" ry="28" fill="#4fffb0" fill-opacity="0.2"/>
  <!-- Scan line -->
  <line x1="60" y1="100" x2="140" y2="100" stroke="#4fffb0" stroke-width="0.5" stroke-opacity="0.3" stroke-dasharray="4,4"/>
  <text x="100" y="195" font-family="monospace" font-size="10" fill="#4fffb0" fill-opacity="0.5" text-anchor="middle">USER</text>
</svg>
